// ===== bale.negah.v1.Negah.GetMessageSeenList =====
message ExtNegahPeer {
  int32 type = 1;
  int32 id = 2;
  int64 accessHash = 3;
}

message ExtNegahMessageId {
  int64 date = 1;
  int64 rid = 2;
  int64 seq = 3;
}

message ExtNegahUserSeen {
