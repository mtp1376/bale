// ===== bale.fanoos.v1.fanoos.Send =====
// ExtFanoosValue: oneof-like value type (exported as Ye / a from module 46216)
// All fields are optional (presence-checked before encoding)
message ExtFanoosValue {
  optional string stringValue = 1;
  optional bool booleanValue = 2;
  optional int32 int32Value = 3;
  optional int64 int64Value = 4;
  optional double doubleValue = 5;
  optional ExtFanoosArrayValue arrayValue = 6;
}

// ExtFanoosArrayValue: repeated wrapper around ExtFanoosValue (exported as l from module 46216)
message ExtFanoosArrayValue {
  repeated ExtFanoosValue array = 1;
}

// ExtFanoosItem: a single key-value pair (exported as d from module 46216)
message ExtFanoosItem {
  string key = 1;
  optional ExtFanoosValue value = 2;
}

// ExtFanoosItems: the structured items map (exported as I8 / f from module 46216)
message ExtFanoosItems {
  repeated ExtFanoosItem items = 1;
}

// ExtFanoosSendRequest: top-level request for bale.fanoos.v1.fanoos.Send
// (JS var l in module 62919; default factory s() = {eventName:"", items:void 0, date:0})
message ExtFanoosSendRequest {
  string eventName = 1;
  optional ExtFanoosItems items = 2;
  int64 date = 3;
}

// ===== bale.feedback.v1.FeedBack.SendFeedBack =====
message ExtFeedBackValue {
  oneof kind {
    string stringValue = 1;
    bool booleanValue = 2;
    int32 int32Value = 3;
    int64 int64Value = 4;
    double doubleValue = 5;
    ExtFeedBackArrayValue arrayValue = 6;
  }
}

message ExtFeedBackArrayValue {
  repeated ExtFeedBackValue array = 1;
}

message ExtFeedBackMapEntry {
  string key = 1;
  ExtFeedBackValue value = 2;
}

message ExtFeedBackMtDetails {
  repeated ExtFeedBackMapEntry items = 1;
}

message ExtFeedBackSendFeedBackRequest {
  int32 rate = 1;
  string title = 2;
  string description = 3;
  map<string, string> details = 4;
  ExtFeedBackMtDetails mtDetails = 5;
}
